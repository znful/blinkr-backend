name: blinkr-dev

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: blinkr
      POSTGRES_USER: blinkr
      POSTGRES_PASSWORD: blinkr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blinkr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    command: sh -c "uv run manage.py migrate && uv run manage.py runserver 0.0.0.0:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: blinkr
      POSTGRES_USER: blinkr
      POSTGRES_PASSWORD: blinkr
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - dev_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: dev
    command: uv run celery -A blinkr worker -l info
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: blinkr
      POSTGRES_USER: blinkr
      POSTGRES_PASSWORD: blinkr
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - dev_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  dev_venv:
